<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLR Smartcar</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 1.5rem; background: transparent; color: var(--text-color, #333); }
    .card { background: var(--card-bg, #f9f9f9); border: 1px solid var(--border-color, #ddd); border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
    h3 { margin: 0 0 .5rem; font-size: 1rem; }
    p  { margin: 0 0 .75rem; font-size: .875rem; color: var(--text-muted, #666); line-height: 1.5; }
    .status { display: flex; align-items: center; gap: .5rem; font-size: .875rem; margin-bottom: 1rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.green  { background: #28a745; }
    .dot.orange { background: #fd7e14; }
    .dot.grey   { background: #aaa; }
    button {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .55rem 1.1rem; border-radius: 6px; border: none;
      font-size: .875rem; font-weight: 500; cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    .btn-primary  { background: #01696f; color: #fff; }
    .btn-danger   { background: #dc3545; color: #fff; }
    .btn-secondary{ background: #6c757d; color: #fff; }
    .info-row { display: flex; justify-content: space-between; font-size: .8rem; border-top: 1px solid var(--border-color, #eee); padding-top: .6rem; margin-top: .6rem; color: var(--text-muted, #888); }
    #connectUrl { font-size: .75rem; word-break: break-all; background: var(--code-bg, #f0f0f0); border-radius: 5px; padding: .4rem .6rem; margin: .5rem 0 .75rem; display: none; }
  </style>
</head>
<body>

<div class="card" id="statusCard">
  <h3>Verbindungsstatus</h3>
  <div class="status">
    <div class="dot grey" id="statusDot"></div>
    <span id="statusText">Lade…</span>
  </div>
  <div id="connectSection" style="display:none">
    <p>Klicke auf <strong>Fahrzeug verbinden</strong>, um den einmaligen Smartcar Connect-Flow zu starten. Danach wird dein Fahrzeug automatisch erkannt.</p>
    <button class="btn-primary" id="btnConnect" onclick="connect()">&#128279; Fahrzeug verbinden</button>
    <div id="connectUrl"></div>
  </div>
  <div id="connectedSection" style="display:none">
    <div class="info-row">
      <span>User ID</span><span id="userIdDisplay">—</span>
    </div>
    <div style="margin-top:.75rem;display:flex;gap:.5rem;flex-wrap:wrap">
      <button class="btn-secondary" onclick="discover()">&#128260; Fahrzeuge neu laden</button>
      <button class="btn-danger"    onclick="disconnect()">&#128465; Verbindung löschen</button>
    </div>
  </div>
</div>

<div class="card" id="vehicleCard" style="display:none">
  <h3>Erkannte Fahrzeuge</h3>
  <div id="vehicleList"></div>
</div>

<div id="msg" style="font-size:.8rem;color:#888;margin-top:.5rem"></div>

<script>
  let api;
  document.addEventListener('DOMContentLoaded', async () => {
    // homebridge-plugin-ui-utils
    while (!window.homebridge) await new Promise(r => setTimeout(r, 50));
    api = window.homebridge;
    await loadStatus();
  });

  async function loadStatus() {
    try {
      const s = await api.request('GET', '/status');
      if (s.connected) {
        showConnected(s.userId);
        if (s.vehicles && s.vehicles.length) showVehicles(s.vehicles);
      } else {
        showDisconnected();
      }
    } catch(e) {
      setMsg('Fehler beim Laden: ' + e.message);
    }
  }

  function showConnected(userId) {
    document.getElementById('statusDot').className  = 'dot green';
    document.getElementById('statusText').textContent = 'Verbunden';
    document.getElementById('userIdDisplay').textContent = userId ?? '—';
    document.getElementById('connectSection').style.display   = 'none';
    document.getElementById('connectedSection').style.display = 'block';
  }

  function showDisconnected() {
    document.getElementById('statusDot').className  = 'dot orange';
    document.getElementById('statusText').textContent = 'Nicht verbunden — bitte Fahrzeug verbinden';
    document.getElementById('connectSection').style.display   = 'block';
    document.getElementById('connectedSection').style.display = 'none';
  }

  function showVehicles(vehicles) {
    const card = document.getElementById('vehicleCard');
    const list = document.getElementById('vehicleList');
    list.innerHTML = vehicles.map(v =>
      `<div class="info-row"><span>${v.nickname}</span><span style="color:#aaa;font-size:.75rem">${v.vin}</span></div>`
    ).join('');
    card.style.display = 'block';
  }

  async function connect() {
    try {
      setMsg('Starte Connect-Flow…');
      const r = await api.request('POST', '/connect');
      const urlBox = document.getElementById('connectUrl');
      urlBox.textContent = r.connectUrl;
      urlBox.style.display = 'block';
      document.getElementById('statusDot').className  = 'dot orange';
      document.getElementById('statusText').textContent = 'Warte auf Autorisierung…';
      // open in new tab
      window.open(r.connectUrl, '_blank');
      setMsg('Browser geöffnet. Nach der Anmeldung wird diese Seite automatisch aktualisiert.');
      // poll for completion
      pollStatus();
    } catch(e) {
      setMsg('Fehler: ' + e.message);
    }
  }

  async function discover() {
    setMsg('Lade Fahrzeuge neu…');
    try {
      const r = await api.request('POST', '/discover');
      if (r.vehicles) showVehicles(r.vehicles);
      setMsg('Fertig.');
    } catch(e) { setMsg('Fehler: ' + e.message); }
  }

  async function disconnect() {
    if (!confirm('Verbindung wirklich löschen? Der Connect-Flow muss danach erneut durchgeführt werden.')) return;
    try {
      await api.request('DELETE', '/connect');
      document.getElementById('vehicleCard').style.display = 'none';
      showDisconnected();
      setMsg('Verbindung gelöscht.');
    } catch(e) { setMsg('Fehler: ' + e.message); }
  }

  async function pollStatus() {
    for (let i = 0; i < 60; i++) {
      await new Promise(r => setTimeout(r, 3000));
      try {
        const s = await api.request('GET', '/status');
        if (s.connected) {
          showConnected(s.userId);
          if (s.vehicles) showVehicles(s.vehicles);
          document.getElementById('connectUrl').style.display = 'none';
          setMsg('✅ Fahrzeug verbunden!');
          return;
        }
      } catch {}
    }
    setMsg('Timeout — bitte Seite neu laden.');
  }

  function setMsg(t) { document.getElementById('msg').textContent = t; }
</script>
</body>
</html>
